services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: touchbase
      POSTGRES_USER: touchbase
      POSTGRES_PASSWORD: touchbase_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U touchbase -d touchbase"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
